<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="220" viewBox="0 24 1150 220">
<style>
  text { font-family: Inter, Arial, sans-serif; fill: #172033; dominant-baseline: middle; }
  .canvas { fill: none; }
  .box { fill: #f8fafc; stroke: #30384d; stroke-width: 1.35; rx: 15; }
  .label { font-size: 22px; font-weight: 700; }
  .small { font-size: 17px; font-weight: 700; }
  .tiny { font-size: 13px; font-weight: 600; }
  .line { fill: none; stroke: #30384d; stroke-width: 1.55; marker-end: url(#arrow); }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#30384d"/>
  </marker>
</defs>
<rect class="canvas" x="16" y="18" width="1118" height="270" rx="24"/>
<text class="label" x="575" y="48" text-anchor="middle">Analysis and design process</text>

<rect class="box" x="20" y="126" width="145" height="92" rx="16"/>
<text class="small" x="92.5" y="159" text-anchor="middle">Survey tools</text>
<text class="tiny" x="92.5" y="184" text-anchor="middle">Jira, Trello, Asana</text>

<rect class="box" x="183" y="126" width="145" height="92" rx="16"/>
<text class="small" x="255.5" y="159" text-anchor="middle">Requirements</text>
<text class="tiny" x="255.5" y="184" text-anchor="middle">scope, workflows</text>

<rect class="box" x="346" y="126" width="145" height="92" rx="16"/>
<text class="small" x="418.5" y="159" text-anchor="middle">Use cases</text>
<text class="tiny" x="418.5" y="184" text-anchor="middle">actors, boundary</text>

<rect class="box" x="509" y="126" width="145" height="92" rx="16"/>
<text class="small" x="581.5" y="159" text-anchor="middle">Architecture</text>
<text class="tiny" x="581.5" y="184" text-anchor="middle">frontend, backend</text>

<rect class="box" x="672" y="126" width="145" height="92" rx="16"/>
<text class="small" x="744.5" y="159" text-anchor="middle">Data model</text>
<text class="tiny" x="744.5" y="184" text-anchor="middle">ERD, migration</text>

<rect class="box" x="835" y="126" width="145" height="92" rx="16"/>
<text class="small" x="907.5" y="159" text-anchor="middle">Behavior</text>
<text class="tiny" x="907.5" y="184" text-anchor="middle">sequence, activity</text>

<rect class="box" x="998" y="126" width="145" height="92" rx="16"/>
<text class="small" x="1070.5" y="159" text-anchor="middle">AI flow</text>
<text class="tiny" x="1070.5" y="184" text-anchor="middle">copilot, assignment</text>

<path class="line" d="M165 172 L183 172"/>
<path class="line" d="M328 172 L346 172"/>
<path class="line" d="M491 172 L509 172"/>
<path class="line" d="M654 172 L672 172"/>
<path class="line" d="M817 172 L835 172"/>
<path class="line" d="M980 172 L998 172"/>
</svg>
